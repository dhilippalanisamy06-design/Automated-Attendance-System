<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-dark bg-success">

<div class="container">

<a class="navbar-brand" href="index.html">
<i class="fa-solid fa-school"></i> Rural Attendance
</a>

<div class="navbar-nav ms-auto">

<a class="nav-link text-white" href="index.html">Home</a>

<a class="nav-link text-white" href="login.html">Login</a>

<a class="nav-link text-white" href="attendance.html">Attendance</a>

<a class="nav-link text-white" href="report.html">Report</a>

</div>

</div>

</nav>

<!-- Registration Form -->

<div class="container mt-5">

<div class="card shadow p-4">

<h2 class="text-center text-success">

Student Registration

</h2>

<div class="row">

<div class="col-md-6">

<label>Name</label>

<input
type="text"
id="name"
class="form-control">

</div>

<div class="col-md-6">

<label>Roll Number</label>

<input
type="text"
id="roll"
class="form-control">

</div>

</div>

<br>

<div class="row">

<div class="col-md-6">

<label>Class</label>

<select id="class" class="form-control">

<option>1</option>

<option>2</option>

<option>3</option>

<option>4</option>

<option>5</option>

<option>6</option>

<option>7</option>

<option>8</option>

<option>9</option>

<option>10</option>

</select>

</div>

<div class="col-md-6">

<label>Section</label>

<select id="section" class="form-control">

<option>A</option>

<option>B</option>

<option>C</option>

</select>

</div>

</div>

<br>

<button
class="btn btn-success"
onclick="registerStudent()">

Register Student

</button>

</div>

</div>

<!-- Registered Students -->

<div class="container mt-5">

<h2 class="text-success">

Registered Students

</h2>

<table class="table table-bordered table-striped">

<thead class="table-success">

<tr>

<th>S.No</th>

<th>Name</th>

<th>Roll</th>

<th>Class</th>

<th>Section</th>

</tr>

</thead>

<tbody id="studentTable">

</tbody>

</table>

</div>

<footer class="bg-success text-white text-center p-3 mt-5">

© 2026 Automated Attendance System

</footer>

<script src="script.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
