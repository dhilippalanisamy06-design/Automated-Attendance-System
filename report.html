<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Reports</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-dark bg-success">

    <div class="container">

        <a class="navbar-brand fw-bold" href="index.html">
            <i class="fa-solid fa-school"></i>
            Rural Attendance
        </a>

        <button class="navbar-toggler" data-bs-toggle="collapse"
            data-bs-target="#menu">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse" id="menu">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="index.html">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="register.html">Register</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="attendance.html">Attendance</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" href="report.html">Reports</a>
                </li>

            </ul>

        </div>

    </div>

</nav>

<!-- Heading -->

<div class="container mt-5">

<h1 class="text-center text-success fw-bold">

Attendance Reports

</h1>

</div>

<!-- Dashboard -->

<div class="container mt-4">

<div class="row text-center">

<div class="col-md-3">

<div class="card shadow">

<div class="card-body">

<h2 id="totalStudents">0</h2>

<p>Total Students</p>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card shadow">

<div class="card-body">

<h2 id="presentStudents">0</h2>

<p>Present</p>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card shadow">

<div class="card-body">

<h2 id="absentStudents">0</h2>

<p>Absent</p>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card shadow">

<div class="card-body">

<h2 id="attendancePercent">0%</h2>

<p>Attendance %</p>

</div>

</div>

</div>

</div>

</div>

<!-- Report Table -->

<div class="container mt-5">

<h2 class="text-success">

Student Attendance Report

</h2>

<table class="table table-bordered table-striped">

<thead class="table-success">

<tr>

<th>Name</th>

<th>Roll</th>

<th>Class</th>

<th>Section</th>

<th>Status</th>

</tr>

</thead>

<tbody id="reportTable">

</tbody>

</table>

<button class="btn btn-primary mt-3"
onclick="exportCSV()">

Export CSV

</button>

</div>

<!-- Chart -->

<div class="container mt-5">

<div class="card shadow">

<div class="card-body">

<h3 class="text-center text-success">

Attendance Statistics

</h3>

<canvas id="attendanceChart"></canvas>

</div>

</div>

</div>

<!-- Footer -->

<footer class="bg-success text-white text-center p-3 mt-5">

© 2026 Automated Attendance System for Rural Schools

</footer>

<!-- Bootstrap -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Chart.js -->

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- JavaScript -->

<script src="script.js"></script>

</body>

</html>
