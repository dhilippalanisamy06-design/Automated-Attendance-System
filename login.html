<!-- Login Form -->

<div class="card shadow p-4">

<h2 class="text-center text-success">

Teacher Login

</h2>

<br>

<div class="mb-3">

<label>Username</label>

<input
type="text"
id="username"
class="form-control"

</div>

<label>Password</label>

<input
type="password"
id="password"
class="form-control"

</div>

    onclick="login(event)">
